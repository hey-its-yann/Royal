<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتبة رويال - الرئيسية</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="menu-body">
    <div class="menu-container">
        <img src="assets/logos/Artboard 51.svg" alt="Royal Library" class="main-logo">
        
        <h2>السنة الأولى</h2>
        <div class="subject-grid">
            <div class="subject-btn" onclick="openViewer('year1/subject1.pdf')">ملخص المادة 1</div>
            <div class="subject-btn" onclick="openViewer('year1/subject2.pdf')">ملخص المادة 2</div>
        </div>

        <h2>السنة الثانية</h2>
        <div class="subject-grid">
            <div class="subject-btn" onclick="openViewer('year2/subject1.pdf')">ملخص المادة 1</div>
            <div class="subject-btn" onclick="openViewer('year2/subject2.pdf')">ملخص المادة 2</div>
        </div>
    </div>

    <script>
        // Secure navigation script
        function openViewer(filePath) {
            window.location.href = `viewer.html?file=${filePath}`;
        }
    </script>
</body>
</html>
