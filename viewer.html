<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتبة رويال - العارض</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-body">
    <div id="watermark-overlay"></div>

    <header class="glass-toolbar top-bar">
        <button class="icon-btn" onclick="window.location.href='index.html'" title="الرئيسية">
            <span class="material-symbols-outlined">home</span>
        </button>
        <div class="branding">
            <img src="assets/logos/Artboard 51.svg" alt="Icon" class="toolbar-icon">
        </div>
        <button class="icon-btn" id="fullscreen-btn" title="ملء الشاشة">
            <span class="material-symbols-outlined">fullscreen</span>
        </button>
    </header>

    <main id="pdf-container">
        <canvas id="pdf-render"></canvas>
    </main>

    <footer class="glass-toolbar bottom-bar">
        <div class="nav-controls">
            <button class="icon-btn highlight" id="next-page" title="التالي">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
            <div class="page-indicator">
                <span id="page-num">1</span> / <span id="page-count">--</span>
            </div>
            <button class="icon-btn highlight" id="prev-page" title="السابق">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
        </div>

        <div class="zoom-controls">
            <button class="icon-btn" id="zoom-in"><span class="material-symbols-outlined">zoom_in</span></button>
            <span id="zoom-level" dir="ltr">100%</span>
            <button class="icon-btn" id="zoom-out"><span class="material-symbols-outlined">zoom_out</span></button>
        </div>
    </footer>

    <script src="js/viewer.js"></script>
</body>
</html>
