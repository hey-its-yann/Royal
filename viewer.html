<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتبة رويال - العارض</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-body">
    <div id="watermark-overlay"></div>

    <header class="toolbar hide-able">
        <div class="branding">
            <button id="home-btn" class="icon-btn" title="الرئيسية">
                <span class="material-symbols-outlined">home</span>
            </button>
            <span dir="ltr">Royal Library</span>
        </div>
        <div class="controls">
            <button id="zoom-out" class="icon-btn">
                <span class="material-symbols-outlined">zoom_out</span>
            </button>
            <span id="zoom-level" dir="ltr">100%</span>
            <button id="zoom-in" class="icon-btn">
                <span class="material-symbols-outlined">zoom_in</span>
            </button>
        </div>
    </header>

    <main id="pdf-container">
        <canvas id="pdf-render"></canvas>
    </main>

    <footer class="bottom-bar hide-able">
        <button id="next-page" class="icon-btn">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
        <span class="page-info">
            صفحة <button id="page-jump-btn" class="page-btn">1</button> من <span id="page-count">--</span>
        </span>
        <button id="prev-page" class="icon-btn">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>
    </footer>

    <div id="page-grid-modal" class="hidden">
        <div class="modal-content">
            <h3>اختر الصفحة</h3>
            <div id="page-grid-container"></div>
            <button id="close-modal" class="close-btn">إغلاق</button>
        </div>
    </div>

    <script src="js/viewer.js"></script>
</body>
</html>
